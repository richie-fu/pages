<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时隅相机 - 支持</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #1d1d1f;
            --sub: #6e6e73;
            --accent: #007AFF;
            --border: #e5e5ea;
            --radius: 12px;
            --max: 720px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            padding: 24px 16px 64px;
        }
        .container { max-width: var(--max); margin: 0 auto; }
        header { text-align: center; padding: 40px 0 32px; }
        .logo { font-size: 48px; margin-bottom: 8px; }
        h1 { font-size: 28px; font-weight: 700; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; }
        h2 { font-size: 18px; font-weight: 600; margin-bottom: 12px; }
        p { font-size: 15px; margin-bottom: 8px; }
        a { color: var(--accent); text-decoration: none; }
        footer { text-align: center; margin-top: 40px; }
        footer a { color: var(--sub); font-size: 14px; margin: 0 12px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">📷</div>
            <h1>时隅相机</h1>
        </header>
        <div class="card">
            <h2>常见问题</h2>
            <p><strong>Q: 天气信息不显示？</strong><br>请确保已授予定位权限。首次使用需在系统弹窗中选择"使用App时允许"。</p>
            <p><strong>Q: 历史照片没有天气？</strong><br>天气数据仅对近期拍摄的照片可用，较早的照片可能无法获取历史天气。</p>
            <p><strong>Q: 如何切换模板？</strong><br>在"模板"标签页中选择或新建模板，返回拍摄页即可生效。</p>
        </div>
        <div class="card">
            <h2>联系我们</h2>
            <p>📧 <a href="mailto:yeextop@163.com">yeextop@163.com</a></p>
        </div>
        <footer>
            <a href="./privacy.html">隐私政策</a>
            <a href="./terms.html">用户协议</a>
        </footer>
    </div>
</body>
</html>
